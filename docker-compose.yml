services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: brandsignal
      POSTGRES_PASSWORD: brandsignal
      POSTGRES_DB: brandsignal
    ports:
      - "5432:5432"
    volumes:
      - brandsignal_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brandsignal"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  brandsignal_data:
